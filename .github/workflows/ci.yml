name: Build and deploy backend app to Azure

on:
    push:
        branches:
            - release
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        name: Build and zip apps from /dist
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js version
              uses: actions/setup-node@v4
              with:
                  node-version: '18.x'

            - name: npm install and build
              run: |
                  npm install
                  npm run build --if-present

            - name: Prepare and Zip artifact
              run: |
                  cp package.json package-lock.json ./dist/apps/data-api/
                  
                  cd ./dist/apps/data-api/
                  zip -r ../../../data-api-release.zip .

            - name: Upload data-api artifact
              uses: actions/upload-artifact@v4
              with:
                  name: data-api
                  path: data-api-release.zip

    deploy-data-api:
        runs-on: ubuntu-latest
        name: Deploy NestJs data-api backend
        needs: build
        environment:
            name: 'Production'

        steps:
            - name: Download artifact
              uses: actions/download-artifact@v4
              with:
                  name: data-api

            - name: Azure Login
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: 'Deploy to Azure Web App'
              id: deploy-to-webapp
              uses: azure/webapps-deploy@v3
              with:
                  app-name: 'festival-planner-api'
                  package: data-api-release.zip