name: Build and deploy backend app to Azure

on:
    push:
        branches:
            - release
    workflow_dispatch:

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        name: Build, Bundle, and Deploy
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '18.x'

            - name: Install and Build
              run: |
                  npm install
                  npm run build --if-present

            - name: Prepare Deployment Folder
              run: |
                  mkdir -p ../deploy_tmp
                  
                  cp -r dist/apps/data-api/* ../deploy_tmp/
                  
                  cp package.json package-lock.json ../deploy_tmp/
                  
                  cd ../deploy_tmp
                  
                  npm install --omit=dev --no-audit --no-fund
                  
                  zip -r $GITHUB_WORKSPACE/data-api-release.zip .
                  
                  cd $GITHUB_WORKSPACE
                  rm -rf ../deploy_tmp

            - name: Azure Login
              uses: azure/login@v2
              with:
                  creds: ${{ secrets.AZURE_CREDENTIALS }}

            - name: 'Deploy to Azure Web App'
              uses: azure/webapps-deploy@v3
              with:
                  app-name: 'festival-planner-api'
                  package: data-api-release.zip

            - name: logout
              run: |
                az logout
              if: always()