<div *ngIf="isEditMode; else loading" class="container mt-4">
    <h1 class="mb-4">Mijn gegevens bewerken</h1>
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label class="form-label text-white">Naam</label>
            <input type="text" class="form-control bg-dark text-white border-secondary" formControlName="name">
        </div>

        <div class="mb-3">
            <label class="form-label text-white">E-mailadres</label>
            <input type="email" class="form-control bg-dark text-white border-secondary" formControlName="emailAddress">
        </div>
        
        <div class="d-flex justify-content-between mt-4">
            <a routerLink="/profile" class="btn btn-outline-light">Annuleren</a>
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">Opslaan</button>
        </div>
    </form>

    <p *ngIf="errorMessage" class="text-danger mt-3">{{ errorMessage }}</p>
</div>

<ng-template #loading>
    <div class="text-center mt-5">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-white mt-2">Gegevens laden...</p>
    </div>
</ng-template>
