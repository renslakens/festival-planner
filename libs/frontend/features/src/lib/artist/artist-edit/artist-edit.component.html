<div class="container mt-5">
    <div class="card shadow-sm col-md-8 mx-auto">
        <div class="card-header bg-dark text-white">
            <h3 class="mb-0">{{ isEditMode ? 'Artiest bewerken' : 'Nieuwe artiest' }}</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="artistForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label class="form-label">Naam</label>
                    <input type="text" class="form-control" formControlName="name"
                        [ngClass]="{ 'is-invalid': submitted && artistForm.get('name')?.invalid }" />
                    <div class="invalid-feedback">Naam is verplicht.</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" formControlName="genre" placeholder="bv. Techno, House"
                            [ngClass]="{ 'is-invalid': submitted && artistForm.get('genre')?.invalid }" />
                        <div class="invalid-feedback">Genre is verplicht.</div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Populariteit (0-10000000)</label>
                        <input type="number" class="form-control" formControlName="popularity"
                            [ngClass]="{ 'is-invalid': submitted && artistForm.get('popularity')?.invalid }" />
                        <div class="invalid-feedback">Populariteit moet tussen 0 en 10.000.000 liggen.</div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Beschrijving</label>
                    <textarea class="form-control" rows="3" formControlName="description"
                        [ngClass]="{ 'is-invalid': submitted && artistForm.get('description')?.invalid }"></textarea>
                    <div class="invalid-feedback">Beschrijving is verplicht.</div>
                </div>

                <div class="d-flex justify-content-between">
                    <a routerLink="/artists" class="btn btn-secondary">Annuleren</a>
                    <button type="submit" class="btn btn-primary">Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>
