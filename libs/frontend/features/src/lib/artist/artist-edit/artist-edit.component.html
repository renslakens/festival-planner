<div class="container mt-5">
    <div class="card shadow-sm col-md-8 mx-auto">
        <div class="card-header bg-dark text-white">
            <h3 class="mb-0">{{ isEditMode ? 'Artiest Bewerken' : 'Nieuwe Artiest' }}</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="artistForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label class="form-label">Naam</label>
                    <input type="text" class="form-control" formControlName="name">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Genre</label>
                        <input type="text" class="form-control" formControlName="genre" placeholder="bv. Techno, House">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Populariteit (0-10000000)</label>
                        <input type="number" class="form-control" formControlName="popularity">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Beschrijving</label>
                    <textarea class="form-control" rows="3" formControlName="description"></textarea>
                </div>

                <div class="d-flex justify-content-between">
                    <a routerLink="/artists" class="btn btn-secondary">Annuleren</a>
                    <button type="submit" class="btn btn-primary" [disabled]="artistForm.invalid">Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>
