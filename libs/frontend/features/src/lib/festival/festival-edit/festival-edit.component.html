<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">{{ isEditMode ? 'Festival Bewerken' : 'Nieuw Festival' }}</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="festivalForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label for="name" class="form-label">Naam</label>
                    <input type="text" id="name" class="form-control" formControlName="name"
                        [ngClass]="{ 'is-invalid': submitted && festivalForm.get('name')?.invalid }" />
                    <div class="invalid-feedback">Naam is verplicht (min. 3 tekens).</div>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label">Beschrijving</label>
                    <textarea id="description" class="form-control" rows="3" formControlName="description"
                        [ngClass]="{ 'is-invalid': submitted && festivalForm.get('description')?.invalid }"></textarea>
                    <div class="invalid-feedback">Beschrijving is verplicht.</div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="date" class="form-label">Datum</label>
                        <input type="date" id="date" class="form-control" formControlName="date"
                            [ngClass]="{ 'is-invalid': submitted && festivalForm.get('date')?.invalid }" />
                        <div class="invalid-feedback">Geldige datum is verplicht.</div>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label for="location" class="form-label">Locatie</label>
                        <input type="text" id="location" class="form-control" formControlName="location"
                            [ngClass]="{ 'is-invalid': submitted && festivalForm.get('location')?.invalid }" />
                        <div class="invalid-feedback">Locatie is verplicht.</div>
                    </div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is18Plus" formControlName="is18Plus" />
                    <label class="form-check-label" for="is18Plus">18+ Evenement</label>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a routerLink="/festivals" class="btn btn-secondary">Annuleren</a>
                    <button type="submit" class="btn btn-primary">
                        {{ isEditMode ? 'Opslaan' : 'Aanmaken' }}
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
