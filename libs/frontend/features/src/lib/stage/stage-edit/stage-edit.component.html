<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header text-white">
            <h3 class="mb-0">{{ isEditMode ? 'Podium bewerken' : 'Nieuw podium toevoegen' }}</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="stageForm" (ngSubmit)="onSubmit()">

                <div class="mb-3">
                    <label for="name" class="form-label">Naam podium</label>
                    <input type="text" id="name" class="form-control" formControlName="name"
                        [ngClass]="{ 'is-invalid': submitted && stageForm.get('name')?.invalid }">
                    <div class="invalid-feedback">Naam is verplicht.</div>
                </div>

                <div class="mb-3">
                    <label for="capacity" class="form-label">Capaciteit</label>
                    <input type="number" id="capacity" class="form-control" formControlName="capacity"
                        [ngClass]="{ 'is-invalid': submitted && stageForm.get('capacity')?.invalid }">
                    <div class="invalid-feedback">Minimaal 10 personen.</div>
                </div>

                <div class="mb-3">
                    <label for="covered" class="form-label">Type</label>
                    <select id="covered" class="form-select" formControlName="covered">
                        <option [value]="false">Outdoor</option>
                        <option [value]="true">Indoor</option>
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <button type="button" class="btn btn-secondary" (click)="isEditMode ? null : null"
                        routerLink="/festivals">Annuleren</button>
                    <button type="submit" class="btn btn-primary">Opslaan</button>
                </div>
            </form>
        </div>
    </div>
</div>
