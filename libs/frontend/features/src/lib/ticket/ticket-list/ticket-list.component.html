<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4" *ngIf="!festivalId">
        <h1>Tickets beschikbaar</h1>
        <a routerLink="/tickets/new" class="btn btn-primary" *ngIf="isAdmin">
            Nieuw ticket
        </a>
    </div>

    <div *ngIf="successMessage" class="alert alert-success mb-4">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-danger mb-4">{{ errorMessage }}</div>

    <div class="row g-4"> @for (ticket of tickets; track ticket._id) {
        <div class="col-md-6 col-lg-4">

            <div class="card">
                <div class="card-body d-flex flex-column justify-content-between p-4">
                    <div>
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title">{{ ticket.name }}</h5>
                        <div *ngIf="ticket.ownerId === currentUserId && isAdmin" class="d-flex">
                            <a [routerLink]="['/tickets', ticket._id, 'edit']" class="btn btn-sm btn-outline-warning me-2">
                                ✏️
                            </a>
                            <button (click)="deleteTicket(ticket._id)" class="btn btn-sm btn-outline-danger">
                                🗑️
                            </button>
                        </div>
                        </div>
                        
                        <p class="text-muted small mb-0" *ngIf="!festivalId && ticket.festivalId">
                            <i class="bi bi-music-note-beamed me-1"></i> {{ getFestivalName(ticket.festivalId) }}
                        </p>
                    </div>

                    <div class="d-flex justify-content-between align-items-end mt-4">
                        <div>
                            <small class="d-block text-muted text-uppercase fw-bold mb-1"
                                style="font-size: 0.7rem;">Prijs</small>
                            <span>€ {{ ticket.price | number:'1.2-2' }}</span>
                        </div>

                        <button (click)="buyTicket(ticket._id)"
                            class="btn btn-primary btn-sm px-4 py-2 rounded-pill fw-bold shadow-sm"
                            [disabled]="!isLoggedIn">
                            {{ isLoggedIn ? 'Kopen' : 'Login' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
        } @empty {
        <div class="alert alert-dark text-center">Geen tickets beschikbaar.</div>
        }
    </div>
</div>
