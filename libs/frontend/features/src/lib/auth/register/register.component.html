<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4">Account aanmaken</h3>

                    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
                    <div *ngIf="success" class="alert alert-success">
                        Account succesvol aangemaakt! Je wordt doorgestuurd naar de login...
                    </div>

                    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" *ngIf="!success">
                        <div class="mb-3">
                            <label class="form-label">Naam</label>
                            <input type="text" class="form-control" formControlName="name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email adres</label>
                            <input type="email" class="form-control" formControlName="emailAddress">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Wachtwoord</label>
                            <input type="password" class="form-control" formControlName="password">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid">
                                Registreren
                            </button>
                        </div>
                    </form>

                    <div class="mt-3 text-center" *ngIf="!success">
                        <small>Heb je al een account? <a routerLink="/login">Log hier in</a></small>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
